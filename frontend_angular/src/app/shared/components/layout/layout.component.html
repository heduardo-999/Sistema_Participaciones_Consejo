  <div class="min-h-screen bg-slate-100 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300">
  <aside
    class="fixed inset-y-0 left-0 z-40 bg-white dark:bg-slate-950 text-slate-900 dark:text-white border-r border-slate-200 dark:border-slate-800 transition-all duration-300"
    [class.w-72]="sidebarOpen()"
    [class.w-20]="!sidebarOpen()"
  >
    <div class="h-16 flex items-center gap-3 px-5 border-b border-slate-200 dark:border-slate-800">
      <div class="h-10 w-10 rounded-xl bg-rose-600 text-white flex items-center justify-center font-black">
        C
      </div>

      <div *ngIf="sidebarOpen()" class="leading-tight">
        <p class="font-bold text-slate-900 dark:text-white">Consejo</p>
        <p class="text-xs text-slate-500 dark:text-slate-400">Participaciones</p>
      </div>
    </div>

    <nav class="p-3 space-y-1">
      <a
        *ngFor="let item of menu()"
        [routerLink]="item.route"
        routerLinkActive="bg-rose-600 text-white"
        class="flex items-center gap-3 px-3 py-3 rounded-xl text-sm text-slate-700 dark:text-slate-300 hover:bg-rose-50 dark:hover:bg-rose-900/30 hover:text-rose-700 dark:hover:text-rose-300 transition"
      >
        <span class="h-8 w-8 rounded-lg bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-xs font-bold">
          {{ item.icon }}
        </span>

        <span *ngIf="sidebarOpen()" class="font-medium">
          {{ item.label }}
        </span>
      </a>
    </nav>
  </aside>

  <main
    class="transition-all duration-300"
    [class.ml-72]="sidebarOpen()"
    [class.ml-20]="!sidebarOpen()"
  >
    <header class="h-16 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-6 sticky top-0 z-30">
      <div class="flex items-center gap-4">
        <button
          type="button"
          (click)="toggleSidebar()"
          class="h-10 w-10 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 flex items-center justify-center"
        >
          ☰
        </button>

        <div>
          <p class="text-xs font-bold text-slate-400">
            {{ breadcrumb() }}
          </p>
          <h1 class="font-black text-slate-900 dark:text-white">
            {{ pageTitle() }}
          </h1>
        </div>
      </div>

      <div class="flex items-center gap-4">
        <button
          type="button"
          (click)="toggleTheme()"
          class="px-4 py-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-sm font-bold transition"
        >
          {{ theme() === 'light' ? '🌙 Oscuro' : '☀️ Claro' }}
        </button>

        <div class="text-right">
          <p class="font-bold text-sm text-slate-900 dark:text-white">
            {{ user()?.name || 'Usuario' }}
          </p>
          <p class="text-xs text-slate-500 dark:text-slate-400">
            {{ user()?.roles?.[0] || 'Sin rol' }}
          </p>
        </div>

        <button
          type="button"
          (click)="logout()"
          class="px-4 py-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-red-50 dark:hover:bg-red-900/30 text-slate-700 dark:text-slate-200 hover:text-red-600 text-sm font-bold transition"
        >
          Salir
        </button>
      </div>
    </header>

    <section class="p-6">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
