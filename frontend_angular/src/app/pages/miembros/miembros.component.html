<section class="space-y-5"><div class="flex flex-col justify-between gap-3 md:flex-row md:items-center"><div><h2 class="text-2xl font-black">Miembros</h2><p class="text-sm text-slate-500">Gestión institucional del módulo.</p></div><button class="btn-primary" (click)="open()">Crear</button></div><div class="card"><div class="flex gap-3"><input class="input" placeholder="Buscar..." [(ngModel)]="q" (keyup.enter)="load()"><button class="btn-secondary" (click)="load()">Buscar</button></div></div><div class="table-wrap"><table class="w-full"><thead><tr><th class="th">Nombre</th><th class="th">Correo</th><th class="th">RFID</th><th class="th">Estado</th><th class="th">Acciones</th></tr></thead><tbody>@for(item of items(); track item.id){<tr><td class="td font-semibold">{{item.nombre}}</td><td class="td">{{item.email}}</td><td class="td">{{item.rfid}}</td><td class="td"><app-status-badge [value]="item.estado || item.status || 'activo'" /></td><td class="td"><button class="btn-secondary mr-2" (click)="open(item)">Editar</button><button class="btn-danger" (click)="remove(item.id)">Eliminar</button></td></tr>} @empty {<tr><td class="td text-center text-slate-500" colspan="8">Sin registros</td></tr>}</tbody></table></div>@if(modal){<div class="fixed inset-0 z-50 grid place-items-center bg-slate-900/40 p-4"><form class="card w-full max-w-xl" (ngSubmit)="save()"><h3 class="text-xl font-black">{{editing?'Editar':'Crear'}} Miembros</h3><div class="mt-4 grid gap-4 md:grid-cols-2"><ng-content></ng-content><label><span class="label">Nombre/Título</span><input class="input" [(ngModel)]="form.nombre" name="nombre"></label><label><span class="label">Correo/Fecha</span><input class="input" [(ngModel)]="form.email" name="email"></label><label><span class="label">Estado</span><input class="input" [(ngModel)]="form.estado" name="estado"></label></div><div class="mt-6 flex justify-end gap-2"><button type="button" class="btn-secondary" (click)="modal=false">Cancelar</button><button class="btn-primary">Guardar</button></div></form></div>}</section>
