<div class="grid min-h-screen place-items-center bg-gradient-to-br from-blue-900 via-blue-800 to-slate-900 p-4 sm:p-6">
  <div class="w-full max-w-5xl overflow-hidden rounded-3xl bg-white shadow-2xl md:grid md:grid-cols-2">

    <section class="hidden bg-blue-800 p-10 text-white md:flex md:flex-col md:justify-center">
      <div class="mb-8 grid h-16 w-16 place-items-center rounded-2xl bg-white/15 text-2xl font-black">
        C
      </div>

      <h1 class="text-3xl font-black leading-tight">
        Sistema de Gestión de Participaciones
      </h1>

      <p class="mt-4 text-blue-100">
        Control institucional de reuniones, intervenciones, RFID, lugares y acceso QR.
      </p>
    </section>

    <form class="p-6 sm:p-8 md:p-10" (ngSubmit)="submit()">
      <div class="md:hidden">
        <div class="mb-6 grid h-14 w-14 place-items-center rounded-2xl bg-blue-800 text-xl font-black text-white">
          C
        </div>
      </div>

      <h2 class="text-2xl font-black text-slate-800 sm:text-3xl">
        Ingresar
      </h2>

      <p class="mt-1 text-sm text-slate-500">
        Acceso autorizado al panel administrativo.
      </p>

      @if (error()) {
        <div class="mt-5 rounded-xl bg-red-50 p-3 text-sm font-semibold text-red-700">
          {{ error() }}
        </div>
      }

      <div class="mt-6">
        <label class="label">
          Correo
        </label>

        <input
          class="input"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          autocomplete="email"
          placeholder="correo@ejemplo.com"
        />
      </div>

      <div class="mt-4">
        <label class="label">
          Contraseña
        </label>

        <div class="flex flex-col gap-2 sm:flex-row">
          <input
            class="input"
            [type]="show ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            required
            autocomplete="current-password"
            placeholder="Ingresa tu contraseña"
          />

          <button
            type="button"
            class="btn-secondary w-full sm:w-auto"
            (click)="show = !show"
          >
            {{ show ? 'Ocultar' : 'Mostrar' }}
          </button>
        </div>
      </div>

      <label class="mt-4 flex items-center gap-2 text-sm text-slate-600">
        <input
          type="checkbox"
          [(ngModel)]="remember"
          name="remember"
          class="h-4 w-4 accent-rose-600"
        />

        Recordar sesión
      </label>

      <button
        class="btn-primary mt-6 w-full"
        [disabled]="loading"
      >
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>
  </div>
</div>
