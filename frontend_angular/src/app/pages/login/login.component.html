<div class="grid min-h-screen place-items-center bg-gradient-to-br from-blue-900 via-blue-800 to-slate-900 p-6">
  <div class="w-full max-w-5xl overflow-hidden rounded-3xl bg-white shadow-2xl md:grid md:grid-cols-2">
    <section class="hidden bg-blue-800 p-10 text-white md:block"><div class="mb-8 grid h-16 w-16 place-items-center rounded-2xl bg-white/15 text-2xl font-black">C</div><h1 class="text-3xl font-black">Sistema de Gestión de Participaciones</h1><p class="mt-4 text-blue-100">Control institucional de reuniones, intervenciones, RFID, lugares y acceso QR.</p></section>
    <form class="p-8 md:p-10" (ngSubmit)="submit()"><h2 class="text-2xl font-black text-slate-800">Ingresar</h2><p class="mt-1 text-sm text-slate-500">Acceso autorizado al panel administrativo</p>
      @if(error()){<div class="mt-5 rounded-xl bg-red-50 p-3 text-sm font-semibold text-red-700">{{error()}}</div>}
      <div class="mt-6"><label class="label">Correo</label><input class="input" type="email" [(ngModel)]="email" name="email" required></div>
      <div class="mt-4"><label class="label">Contraseña</label><div class="flex gap-2"><input class="input" [type]="show ? 'text':'password'" [(ngModel)]="password" name="password" required><button type="button" class="btn-secondary" (click)="show=!show">{{show?'Ocultar':'Mostrar'}}</button></div></div>
      <label class="mt-4 flex items-center gap-2 text-sm text-slate-600"><input type="checkbox" [(ngModel)]="remember" name="remember"> Recordar sesión</label>
      <button class="btn-primary mt-6 w-full" [disabled]="loading">{{loading?'Ingresando...':'Ingresar'}}</button>
    </form>
  </div>
</div>
