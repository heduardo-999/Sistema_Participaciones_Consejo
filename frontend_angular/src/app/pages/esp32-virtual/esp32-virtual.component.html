<section class="grid gap-5 lg:grid-cols-[1fr_360px]"><div class="card"><h2 class="text-2xl font-black">ESP32 Virtual</h2><div class="mx-auto mt-8 max-w-xl rounded-[2rem] bg-slate-800 p-8 text-white shadow-2xl"><div class="flex justify-between"><h3 class="text-xl font-black">ESP32 DEVKIT</h3><span class="rounded-full bg-white/10 px-3 py-1 text-xs">{{estado()}}</span></div><div class="mt-8 grid grid-cols-3 gap-4"><div class="h-5 rounded-full" [class.bg-green-400]="estado()==='conectado'" [class.bg-slate-600]="estado()!=='conectado'"></div><div class="h-5 rounded-full" [class.bg-yellow-400]="estado()==='mantenimiento'" [class.bg-slate-600]="estado()!=='mantenimiento'"></div><div class="h-5 rounded-full" [class.bg-red-500]="estado()==='dañada'" [class.bg-slate-600]="estado()!=='dañada'"></div></div><div class="mt-8 rounded-2xl border border-white/20 bg-slate-900 p-6 text-center">Lector RFID</div><button class="mx-auto mt-8 grid h-32 w-32 place-items-center rounded-full bg-red-600 text-center font-black shadow-xl transition active:scale-95" (click)="solicitar()">Solicitar intervención</button>@if(anim()){<div class="mt-6 animate-pulse rounded-xl bg-blue-500 p-3 text-center font-bold">Solicitud enviada a la cola...</div>}</div></div><aside class="card"><h3 class="font-black">Estado</h3><div class="mt-4 grid gap-2"><button class="btn-secondary" (click)="estado.set('conectado')">Conectado</button><button class="btn-secondary" (click)="estado.set('mantenimiento')">Mantenimiento</button><button class="btn-secondary" (click)="estado.set('dañada')">Dañada</button></div></aside></section>
